name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t cv-test .

      - name: Verify HTML is served
        run: docker run --rm cv-test cat /usr/share/nginx/html/index.html | head -1 | grep -q '<!DOCTYPE html>'
